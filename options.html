<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OmbiChrome Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1d23;
      color: #e1e4e8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }
    .container {
      max-width: 480px;
      width: 100%;
    }
    h1 {
      color: #dfa227;
      font-size: 24px;
      margin-bottom: 8px;
    }
    p.subtitle {
      color: #6e7681;
      font-size: 14px;
      margin-bottom: 32px;
    }
    .field {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #8b949e;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    label .optional {
      font-weight: 400;
      text-transform: none;
      color: #6e7681;
    }
    input {
      width: 100%;
      background: #24272e;
      border: 1px solid #3d424a;
      border-radius: 6px;
      padding: 10px 14px;
      color: #e1e4e8;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #dfa227; }
    input::placeholder { color: #6e7681; }
    .hint {
      font-size: 12px;
      color: #6e7681;
      margin-top: 4px;
    }
    .actions {
      display: flex;
      gap: 12px;
      margin-top: 28px;
    }
    button {
      padding: 10px 24px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    #saveBtn {
      background: #dfa227;
      color: #1a1d23;
    }
    #saveBtn:hover { background: #e8b445; }
    #testBtn {
      background: #24272e;
      color: #8b949e;
      border: 1px solid #3d424a;
    }
    #testBtn:hover { border-color: #dfa227; color: #dfa227; }
    .status {
      margin-top: 16px;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
    }
    .status.success { display: block; background: #1b3a2a; color: #3fb950; }
    .status.error { display: block; background: #3d1a1a; color: #f85149; }
  </style>
</head>
<body>
  <div class="container">
    <h1>OmbiChrome Settings</h1>
    <p class="subtitle">Configure your Ombi server and API keys.</p>

    <div class="field">
      <label>Ombi Server URL</label>
      <input type="url" id="ombiUrl" placeholder="https://ombi.example.com">
      <div class="hint">Full URL to your Ombi instance (no trailing slash).</div>
    </div>

    <div class="field">
      <label>Ombi API Key</label>
      <input type="password" id="ombiApiKey" placeholder="Your Ombi API key">
      <div class="hint">Found in Ombi &rarr; Settings &rarr; Ombi &rarr; API Key.</div>
    </div>

    <div class="field">
      <label>OMDb API Key <span class="optional">(optional)</span></label>
      <input type="text" id="omdbApiKey" placeholder="Your OMDb API key">
      <div class="hint">Enables IMDB search results. Get a free key at omdbapi.com.</div>
    </div>

    <div class="actions">
      <button id="saveBtn">Save Settings</button>
      <button id="testBtn">Test Connection</button>
    </div>

    <div class="status" id="status"></div>
  </div>
  <script src="options.js"></script>
</body>
</html>
